<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Anthrogen Talent</title>
<style>
  :root {
    --bg: #0e1116; --card: #161b22; --card2: #1c2128; --border: #2d333b; --text: #e6edf3;
    --dim: #8b949e; --accent: #58a6ff; --yes: #2ea043; --no: #da3633; --maybe: #d29922;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 10px; color: var(--text); background: none; }
  .gear { color: var(--dim); font-size: 20px; padding: 4px 8px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tabs button {
    flex: 1; padding: 10px 0; font-weight: 600; font-size: 15px;
    background: var(--card); border: 1px solid var(--border); color: var(--dim);
  }
  .tabs button.on { color: var(--text); border-color: var(--accent); }
  .tabs .count { font-size: 12px; color: var(--accent); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .card h2 { font-size: 22px; line-height: 1.25; }
  .sub { color: var(--dim); margin: 2px 0 12px; font-size: 14px; }
  .badge {
    display: inline-block; font-size: 12px; font-weight: 600; padding: 2px 8px;
    border-radius: 999px; vertical-align: 3px; margin-left: 8px;
    background: #1f3a5f; color: var(--accent);
  }
  .section { margin-top: 14px; }
  .label {
    font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 4px;
  }
  .section p { font-size: 15px; }
  .evidence a {
    display: block; color: var(--accent); text-decoration: none; font-size: 14px;
    padding: 8px 10px; background: var(--card2); border-radius: 8px; margin-bottom: 6px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .watch { color: var(--maybe); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip {
    background: var(--card2); border: 1px solid var(--border); color: var(--dim);
    font-size: 13px; padding: 5px 10px; border-radius: 999px;
  }
  .chip.on { color: var(--text); border-color: var(--accent); }
  textarea, input, select {
    width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 12px; font: inherit; font-size: 15px;
  }
  textarea { resize: none; height: 64px; }
  textarea:focus, input:focus, select:focus { outline: 1px solid var(--accent); }

  .actions { display: flex; gap: 10px; margin-top: 14px; }
  .actions button { flex: 1; padding: 14px 0; font-size: 16px; font-weight: 700; color: #fff; }
  .b-yes { background: var(--yes); } .b-no { background: var(--no); }
  .b-maybe { background: transparent; border: 1px solid var(--maybe); color: var(--maybe); }
  .actions button:disabled { opacity: .5; }

  .progress { text-align: center; color: var(--dim); font-size: 13px; margin: 14px 0 8px; }
  .empty { text-align: center; padding: 50px 20px; color: var(--dim); }
  .empty .big { font-size: 44px; margin-bottom: 12px; }
  .empty h2 { color: var(--text); font-size: 18px; margin-bottom: 6px; }

  .row {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .row .who { flex: 1; min-width: 0; }
  .row .who b { display: block; font-size: 15px; }
  .row .who span { display: block; color: var(--dim); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .s-pending { background: #30363d; color: var(--dim); }
  .s-yes, .s-hired { background: rgba(46,160,67,.2); color: #3fb950; }
  .s-no, .s-archived { background: rgba(218,54,51,.18); color: #ff7b72; }
  .s-maybe { background: rgba(210,153,34,.18); color: #d29922; }
  .s-contacted, .s-replied, .s-interviewing, .s-offer { background: rgba(88,166,255,.16); color: var(--accent); }
  .s-watch, .s-tracked { background: rgba(210,153,34,.18); color: #d29922; }
  .s-pool { background: #30363d; color: var(--dim); border: 1px dashed var(--border); }

  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin: 10px 0; -webkit-overflow-scrolling: touch; }
  .filters .chip { flex-shrink: 0; }
  .back { color: var(--accent); font-size: 15px; padding: 4px 0; margin-bottom: 10px; }
  .notes li { font-size: 14px; background: var(--card2); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; list-style: none; }
  .notes li span { color: var(--dim); font-size: 12px; display: block; }
  .save-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--accent); color: #04121f; font-weight: 700; }

  .setup label { display: block; font-size: 13px; color: var(--dim); margin: 14px 0 4px; }
  .setup .save { width: 100%; margin-top: 18px; padding: 14px; background: var(--accent); color: #04121f; font-weight: 700; font-size: 16px; }
  .setup .alt { width: 100%; margin-top: 10px; padding: 12px; border: 1px solid var(--border); color: var(--dim); }
  .setup .hint { font-size: 13px; color: var(--dim); margin-top: 14px; }
  .setup .hint a { color: var(--accent); }
  .err { color: #ff7b72; font-size: 14px; margin-top: 10px; min-height: 20px; }
  .ok { color: #3fb950; font-size: 14px; margin-top: 10px; min-height: 20px; }
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: #2d333b; color: var(--text); padding: 10px 18px; border-radius: 999px;
    font-size: 14px; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; z-index: 9;
  }
  .toast.show { opacity: 1; }
  .spin { text-align: center; padding: 60px 0; color: var(--dim); }
  .menu { position: absolute; right: 16px; top: 52px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px; z-index: 5; min-width: 220px; }
  .menu .who { color: var(--dim); font-size: 13px; padding: 6px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .menu button { display: block; width: 100%; text-align: left; padding: 8px 10px; font-size: 14px; }
  .menu button:hover { background: var(--card2); }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="spin">Loading…</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPA_URL = "https://iqzfpguwwdxmefnopsay.supabase.co";
const SUPA_ANON_KEY = "";   // optional hardcode; falls back to localStorage
const CHIPS = ["too junior", "too senior", "wrong subfield", "weak evidence", "not recruitable", "strong fit", "reach out fast"];
const STATUSES = ["pending", "yes", "maybe", "no", "watch", "tracked", "contacted", "replied", "interviewing", "offer", "hired", "archived"];

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const app = $("#app");
const state = { rows: null, tab: "review", reviewed: 0, reviewRole: null, search: "", filter: "all", roleFilter: "all", detail: null, pool: null, includePool: false, user: null, member: null, roles: [], showRoles: false };
let supa = null;

const anonKey = () => SUPA_ANON_KEY || localStorage.getItem("sb_anon") || "";

function toast(msg) {
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
}
const today = () => new Date().toISOString().slice(0, 10);
function unwrap({ data, error }) { if (error) throw error; return data; }

/* ---------- data ----------
   The store is normalized: `people` (shared identity) + `reviews` (per-member
   judgment). The UI works on a flat `row` per review that merges the joined person,
   so render code stays shaped like the old `candidates` row. role = position.key. */

// flatten a reviews-joined-to-people-and-position row into the legacy flat shape
function flattenReview(r) {
  const p = r.people || {};
  return {
    review_id: r.id,
    person_id: r.person_id,
    id: r.id,                          // render code keys off .id
    name: p.name || "",
    affiliation: p.affiliation || "",
    evidence: p.evidence || [],
    role: r.positions ? r.positions.key : r.role_key,
    position_id: r.position_id,
    member_id: r.member_id,
    why: r.why || "",
    recruitability: r.recruitability || "",
    watch_out: r.watch_out || "",
    tier: r.tier || null,
    status: r.status,
    watch_reason: r.watch_reason || null,
    watch_revisit: r.watch_revisit || null,
    sourced: r.sourced,
    notes: r.notes || [],
  };
}

// load the current member's reviews (admin still scopes the queue to themselves;
// the all-team admin view is a separate Phase-B stats screen).
const loadReviews = async () => {
  const rows = unwrap(await supa.from("reviews")
    .select("*, people(name,affiliation,evidence), positions(key,title), notes(*)")
    .eq("member_id", state.member.id)
    .order("sourced", { ascending: false })
    .order("created_at", { referencedTable: "notes", ascending: true })
    .limit(2000));
  return rows.map(flattenReview);
};
const loadPool = async () => unwrap(
  await supa.from("pool").select("*")
    .eq("member_id", state.member.id)
    .order("evaluated", { ascending: false }).limit(2000));
// positions the current member is assigned to (their reviewable roles)
async function loadRoles() {
  const a = unwrap(await supa.from("assignments")
    .select("positions(key,slug,title,brief,active)")
    .eq("member_id", state.member.id));
  const ps = a.map(x => x.positions).filter(Boolean).filter(p => p.active);
  // admins with no explicit assignment still see all active positions
  if (!ps.length && state.member.permission === "admin")
    return unwrap(await supa.from("positions").select("key,slug,title,brief,active").eq("active", true).order("created_at"));
  return ps;
}

async function pushFeedback(c, status, noteText) {
  unwrap(await supa.from("reviews")
    .update({ status, status_updated: new Date().toISOString(), feedback_pending: true })
    .eq("id", c.review_id));
  c.status = status;
  if (noteText) {
    const note = unwrap(await supa.from("notes")
      .insert({ review_id: c.review_id, author: state.user.email, text: noteText })
      .select())[0];
    (c.notes = c.notes || []).push(note);
  }
}

/* ---------- one-time key config ---------- */
function renderKeySetup(err = "") {
  app.innerHTML = `
    <header><h1>Anthrogen Talent</h1></header>
    <div class="card setup">
      <p style="font-size:14px;color:var(--dim)">One-time setup on this device.</p>
      <label>Supabase publishable (anon) key</label>
      <input id="key" type="password" placeholder="sb_publishable_… or eyJ…" value="${esc(localStorage.getItem("sb_anon") || "")}" autocomplete="off">
      <button class="save" id="save">Save</button>
      <div class="err">${esc(err)}</div>
      <p class="hint">From the <a href="https://supabase.com/dashboard" target="_blank">Supabase dashboard</a> → Project Settings → API: the <b>publishable/anon</b> key (NOT service_role — that one stays out of browsers). This key is safe to share; row-level security means it grants nothing without a login.</p>
    </div>`;
  $("#save").onclick = () => {
    localStorage.setItem("sb_anon", $("#key").value.trim());
    boot();
  };
}

/* ---------- login ---------- */
function renderLogin(msg = "", isErr = false) {
  app.innerHTML = `
    <header><h1>Anthrogen Talent</h1></header>
    <div class="card setup">
      <label>Work email</label>
      <input id="email" type="email" placeholder="you@anthrogen.com" value="${esc(localStorage.getItem("rr_email") || "")}" autocomplete="email">
      <button class="save" id="magic">Email me a login link</button>
      <label style="margin-top:18px">…or sign in with a password</label>
      <input id="pw" type="password" placeholder="password" autocomplete="current-password">
      <button class="alt" id="pwbtn">Sign in with password</button>
      <div class="${isErr ? "err" : "ok"}">${esc(msg)}</div>
    </div>`;
  const email = () => { const e = $("#email").value.trim(); localStorage.setItem("rr_email", e); return e; };
  $("#magic").onclick = async () => {
    $("#magic").disabled = true;
    const { error } = await supa.auth.signInWithOtp({
      email: email(),
      options: { emailRedirectTo: location.origin + location.pathname },
    });
    if (error) renderLogin(error.message, true);
    else renderLogin("Link sent — check your email on this device.");
  };
  $("#pwbtn").onclick = async () => {
    $("#pwbtn").disabled = true;
    const { error } = await supa.auth.signInWithPassword({ email: email(), password: $("#pw").value });
    if (error) renderLogin(error.message, true);
    // success → onAuthStateChange boots the app
  };
}

function renderNotAuthorized() {
  app.innerHTML = `
    <header><h1>Anthrogen Talent</h1></header>
    <div class="empty"><div class="big">🚫</div>
      <h2>${esc(state.user.email)} isn't authorized</h2>
      <p>Ask Connor to add this email to the app_users table.</p>
      <button class="save-btn" style="max-width:200px" id="out">Sign out</button></div>`;
  $("#out").onclick = async () => { await supa.auth.signOut(); };
}

/* ---------- shell ---------- */
function shell(inner) {
  const pending = state.rows.filter(c => c.status === "pending").length;
  app.innerHTML = `
    <header><h1>Anthrogen Talent</h1><button class="gear" id="gear">⚙︎</button></header>
    <div class="tabs">
      <button id="t-review" class="${state.tab === "review" ? "on" : ""}">Review ${pending ? `<span class="count">${pending}</span>` : ""}</button>
      <button id="t-talent" class="${state.tab === "talent" ? "on" : ""}">Talent <span class="count" style="color:var(--dim)">${state.rows.length}</span></button>
    </div>
    <div id="body">${inner}</div>`;
  $("#gear").onclick = () => {
    if ($(".menu")) return $(".menu").remove();
    const m = document.createElement("div");
    m.className = "menu";
    const admin = state.member && state.member.permission === "admin";
    m.innerHTML = `<div class="who">${esc(state.user.email)}${admin ? " · admin" : ""}</div>
      ${admin ? `<button id="m-roles">Positions</button>` : ""}
      <button id="m-refresh">Refresh</button>
      <button id="m-key">Change key</button>
      <button id="m-out">Sign out</button>`;
    document.body.appendChild(m);
    if (admin) $("#m-roles").onclick = () => { m.remove(); state.showRoles = true; render(); };
    $("#m-refresh").onclick = () => { m.remove(); boot(); };
    $("#m-key").onclick = () => { m.remove(); renderKeySetup(); };
    $("#m-out").onclick = async () => { m.remove(); await supa.auth.signOut(); };
  };
  $("#t-review").onclick = () => { state.tab = "review"; state.detail = null; render(); };
  $("#t-talent").onclick = () => { state.tab = "talent"; state.detail = null; render(); };
}

function candidateCard(c, extra = "") {
  return `
    <div class="card">
      <h2>${esc(c.name)}<span class="badge">${esc(c.role)}</span></h2>
      <div class="sub">${esc(c.affiliation)} · sourced ${esc(c.sourced)}</div>
      <div class="section"><div class="label">Why them</div><p>${esc(c.why)}</p></div>
      <div class="section evidence"><div class="label">Evidence</div>
        ${(c.evidence || []).map(e => `<a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.label || e.url)}</a>`).join("") || `<p style="color:var(--dim);font-size:14px">none</p>`}
      </div>
      <div class="section"><div class="label">Recruitability</div><p>${esc(c.recruitability)}</p></div>
      <div class="section"><div class="label">Watch out</div><p class="watch">${esc(c.watch_out)}</p></div>
      ${extra}
    </div>`;
}

/* ---------- roles screen ---------- */
function renderRoles() {
  shell(`
    <button class="back" id="back">← Back</button>
    <div class="card setup">
      <div class="label">Open roles</div>
      ${state.roles.map(r => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="flex:1"><b>${esc(r.key)}</b> — ${esc(r.title)}
            ${r.brief ? `<div style="color:var(--dim);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.brief)}</div>` : ""}</div>
          <button class="chip ${r.active ? "on" : ""}" data-toggle="${esc(r.key)}">${r.active ? "active" : "paused"}</button>
        </div>`).join("")}
      <div class="label" style="margin-top:20px">Add a role</div>
      <label>Short code (the badge, e.g. CB)</label>
      <input id="r-key" type="text" maxlength="6" autocomplete="off">
      <label>Title</label>
      <input id="r-title" type="text" placeholder="e.g. Computational Biologist" autocomplete="off">
      <label>Brief the agent — its starting point for this role</label>
      <textarea id="r-brief" style="height:130px" placeholder="Paste the JD or braindump: what they'll do here, must-haves, what great looks like, anti-patterns, example people or labs…"></textarea>
      <button class="save" id="r-add">Add role</button>
      <p class="hint">Tomorrow morning the agent turns this brief into a full calibration profile (researching the role's talent landscape) <i>before</i> sourcing — so even day one isn't generic. The richer the brief, the better day one is.</p>
    </div>`);
  $("#back").onclick = () => { state.showRoles = false; render(); };
  $$("[data-toggle]").forEach(b => b.onclick = async () => {
    const r = state.roles.find(x => x.key === b.dataset.toggle);
    try {
      unwrap(await supa.from("positions").update({ active: !r.active }).eq("id", r.id));
      r.active = !r.active;
      toast(`${r.key} ${r.active ? "active" : "paused"}`);
      render();
    } catch (e) { toast("Only admins can change positions"); }
  });
  $("#r-add").onclick = async () => {
    const key = $("#r-key").value.trim().toUpperCase();
    const title = $("#r-title").value.trim();
    const brief = $("#r-brief").value.trim();
    if (!key || !title) return toast("Code and title are required");
    if (!brief) return toast("Write a brief — that's what stops blind firing");
    if (state.roles.some(r => r.key === key)) return toast(`${key} already exists`);
    const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    $("#r-add").disabled = true;
    try {
      const row = unwrap(await supa.from("positions")
        .insert({ org_id: state.member.org_id, key, slug, title, brief, active: true })
        .select())[0];
      // assign the creating admin to it so it shows in their queue
      await supa.from("assignments").insert({ org_id: state.member.org_id, member_id: state.member.id, position_id: row.id, created_by: state.member.id });
      state.roles.push(row);
      toast(`${key} added — agent calibrates on its next run`);
      render();
    } catch (e) { toast("Only admins can add positions"); $("#r-add").disabled = false; }
  };
}

/* ---------- review tab ---------- */
function roleTitle(key) {
  const r = state.roles.find(x => x.key === key);
  return r ? r.title : key;
}
// a pool row carries position_id, not a role key — resolve it for display
function poolRole(p) {
  const r = state.roles.find(x => x.id === p.position_id);
  return r ? r.key : "";
}

function renderReview() {
  // two review lanes: contact-now ('pending') and keep-warm ('watch')
  const inReview = state.rows.filter(c => c.status === "pending" || c.status === "watch");
  const byRole = state.roles
    .map(r => ({
      key: r.key, title: r.title,
      now: inReview.filter(c => c.role === r.key && c.status === "pending").length,
      warm: inReview.filter(c => c.role === r.key && c.status === "watch").length,
    }))
    .filter(r => r.now + r.warm > 0);
  const orphan = inReview.filter(c => !state.roles.some(r => r.key === c.role)).length;

  if (!inReview.length) {
    shell(`<div class="empty"><div class="big">${state.reviewed ? "✅" : "📭"}</div>
      <h2>${state.reviewed ? "All done" : "Queue is clear"}</h2>
      <p>${state.reviewed
        ? `${state.reviewed} verdict${state.reviewed > 1 ? "s" : ""} saved — tomorrow's run learns from them.`
        : "No pending candidates. New ones land each morning."}</p></div>`);
    state.reviewRole = null;
    return;
  }

  const choices = byRole.length + (orphan ? 1 : 0);
  if (!state.reviewRole && choices > 1) {
    shell(`
      <div class="empty" style="padding:24px 8px 8px">
        <div class="big">📋</div>
        <h2>Pick a queue to review</h2>
        <p>${inReview.length} to review. One role at a time to stay focused.</p>
      </div>
      ${byRole.map(r => `
        <button class="row" data-rolepick="${esc(r.key)}">
          <div class="who"><b>${esc(r.title)}</b><span>${r.now} to contact${r.warm ? ` · ${r.warm} keep-warm` : ""}</span></div>
          <span class="pill s-pending">${r.now + r.warm}</span>
        </button>`).join("")}
      ${orphan ? `<button class="row" data-rolepick="__all__">
          <div class="who"><b>Everything</b><span>review all roles in one stream</span></div>
          <span class="pill s-pending">${inReview.length}</span></button>` : ""}`);
    $$("[data-rolepick]").forEach(b => b.onclick = () => { state.reviewRole = b.dataset.rolepick; state.reviewed = 0; render(); });
    return;
  }

  const activeRole = state.reviewRole || (byRole[0] && byRole[0].key) || "__all__";
  const inRole = c => activeRole === "__all__" || c.role === activeRole;
  // contact-now first, then keep-warm — never interleaved
  const nowQ = inReview.filter(c => inRole(c) && c.status === "pending").sort((a, b) => (a.sourced || "").localeCompare(b.sourced || ""));
  const warmQ = inReview.filter(c => inRole(c) && c.status === "watch").sort((a, b) => (a.sourced || "").localeCompare(b.sourced || ""));

  if (!nowQ.length && !warmQ.length) { state.reviewRole = null; return renderReview(); }

  const lane = nowQ.length ? "now" : "warm";       // finish contact-now before keep-warm
  const queue = lane === "now" ? nowQ : warmQ;
  const c = queue[0];
  const roleLabel = activeRole === "__all__" ? "All roles" : roleTitle(activeRole);
  const switchable = choices > 1;

  // keep-warm lane: different framing + verdicts (Track / Skip)
  const laneBanner = lane === "warm"
    ? `<div class="section" style="margin-top:0"><div class="label" style="color:var(--maybe)">🔥 Keep warm — relationship-building, not contact-now</div>
        <p style="color:var(--dim);font-size:14px">${esc(c.watch_reason || "Strong but not recruitable yet.")}${c.watch_revisit ? ` <b style="color:var(--text)">· revisit ${esc(c.watch_revisit)}</b>` : ""}</p></div>`
    : "";
  const actions = lane === "warm"
    ? `<div class="actions">
        <button class="b-no" data-v="no">👎 Skip</button>
        <button class="b-yes" data-v="tracked">🔥 Track</button>
      </div>`
    : `<div class="actions">
        <button class="b-no" data-v="no">👎 No</button>
        <button class="b-maybe" data-v="maybe">🤔</button>
        <button class="b-yes" data-v="yes">👍 Yes</button>
      </div>`;
  const lanePill = lane === "warm"
    ? `<span class="pill s-maybe">${esc(roleLabel)} · keep warm</span>`
    : `<span class="pill s-pending">${esc(roleLabel)}</span>`;
  const progress = lane === "warm"
    ? `${esc(roleLabel)} keep-warm · ${state.reviewed + 1} · ${queue.length} left${nowQ.length ? "" : ""}`
    : `${esc(roleLabel)} · contact-now ${state.reviewed + 1} of ${state.reviewed + nowQ.length}${warmQ.length ? ` · then ${warmQ.length} keep-warm` : ""}`;

  shell(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      ${lanePill}
      ${switchable ? `<button class="back" id="switch" style="margin:0">⇄ switch queue</button>` : ""}
    </div>` +
    laneBanner +
    candidateCard(c, `
      <div class="section"><div class="label">Note (optional — this trains the agent)</div>
        <div class="chips">${CHIPS.map(t => `<button class="chip" data-t="${esc(t)}">${esc(t)}</button>`).join("")}</div>
        <textarea id="note" placeholder="${lane === "warm" ? "why track / why skip…" : "why yes / why no…"}"></textarea>
      </div>
      ${actions}`) +
    `<div class="progress">${progress}</div>`);
  if (switchable) $("#switch").onclick = () => { state.reviewRole = null; state.reviewed = 0; render(); };
  $$(".chip").forEach(ch => ch.onclick = () => {
    ch.classList.toggle("on");
    const on = $$(".chip.on").map(x => x.dataset.t);
    const free = $("#note").value.split(" · ").filter(p => p && !CHIPS.includes(p));
    $("#note").value = [...on, ...free].join(" · ");
  });
  $$(".actions button").forEach(b => b.onclick = async () => {
    $$(".actions button").forEach(x => x.disabled = true);
    try {
      await pushFeedback(c, b.dataset.v, $("#note").value.trim());
      state.reviewed++;
      toast(`${c.name.split(" ")[0]} → ${b.dataset.v}`);
      render();
    } catch (e) {
      toast("Save failed — try again");
      $$(".actions button").forEach(x => x.disabled = false);
    }
  });
}

/* ---------- talent tab ---------- */
function renderTalent() {
  if (state.detail) return renderDetail();
  const q = state.search.toLowerCase();
  const present = [...new Set(state.rows.map(c => c.status))];
  const list = state.rows
    .filter(c => state.filter === "all" || c.status === state.filter)
    .filter(c => state.roleFilter === "all" || c.role === state.roleFilter)
    .filter(c => !q || [c.name, c.affiliation, c.why, c.recruitability,
        ...(c.notes || []).map(n => n.text), ...(c.evidence || []).map(e => e.label)]
      .join(" ").toLowerCase().includes(q))
    .sort((a, b) => (b.sourced || "").localeCompare(a.sourced || ""));
  let poolRows = "";
  if (state.includePool && state.pool) {
    poolRows = state.pool
      .map((p, i) => ({ p, i }))
      .filter(({ p }) => !q || [p.name, p.affiliation, p.assessment, p.tier, p.channel]
        .join(" ").toLowerCase().includes(q))
      .map(({ p, i }) => `
        <button class="row" data-pool="${i}" style="opacity:.78">
          <div class="who"><b>${esc(p.name)} <span style="color:var(--dim);font-size:12px">${esc(poolRole(p))}</span></b>
            <span>${esc(p.affiliation || "")}${p.assessment ? " · " + esc(p.assessment) : ""}</span></div>
          <span class="pill s-pool">${esc(p.tier || "pool")}</span>
        </button>`).join("");
  }
  shell(`
    <input type="search" id="q" placeholder="Search name, affiliation, notes…" value="${esc(state.search)}">
    <div class="filters">
      ${["all", ...STATUSES.filter(s => present.includes(s))].map(s =>
        `<button class="chip ${state.filter === s ? "on" : ""}" data-s="${s}">${s}</button>`).join("")}
      <button class="chip ${state.includePool ? "on" : ""}" id="poolchip">+ pool${state.pool ? ` (${state.pool.length})` : ""}</button>
    </div>
    ${state.roles.length > 1 ? `<div class="filters">
      ${["all", ...state.roles.map(r => r.key)].map(r =>
        `<button class="chip ${state.roleFilter === r ? "on" : ""}" data-r="${esc(r)}">${esc(r)}</button>`).join("")}
    </div>` : ""}
    ${list.map(c => `
      <button class="row" data-id="${esc(c.id)}">
        <div class="who"><b>${esc(c.name)} <span style="color:var(--accent);font-size:12px">${esc(c.role)}</span></b>
          <span>${esc(c.affiliation)}</span></div>
        <span class="pill s-${esc(c.status)}">${esc(c.status)}</span>
      </button>`).join("")}
    ${poolRows}
    ${(list.length || poolRows) ? "" :
      `<div class="empty"><div class="big">🔍</div><h2>No matches</h2><p>${state.rows.length ? "Try a different search or filter." : "The database fills up as the agent runs each morning."}</p></div>`}`);
  $("#q").oninput = e => { state.search = e.target.value; render(); const i = $("#q"); i.focus(); i.setSelectionRange(i.value.length, i.value.length); };
  $$(".filters .chip[data-s]").forEach(b => b.onclick = () => { state.filter = b.dataset.s; render(); });
  $$(".filters .chip[data-r]").forEach(b => b.onclick = () => { state.roleFilter = b.dataset.r; render(); });
  $("#poolchip").onclick = async () => {
    if (!state.pool) {
      $("#poolchip").textContent = "loading…";
      try { state.pool = await loadPool(); } catch (e) { toast("Couldn't load pool"); return; }
    }
    state.includePool = !state.includePool;
    render();
  };
  $$(".row[data-id]").forEach(r => r.onclick = () => { state.detail = r.dataset.id; render(); });
  $$(".row[data-pool]").forEach(r => r.onclick = () => { state.detail = "pool:" + r.dataset.pool; render(); });
}

function renderPoolDetail(p) {
  shell(`
    <button class="back" id="back">← Talent</button>
    <div class="card">
      <h2>${esc(p.name)}<span class="badge">${esc(poolRole(p) || "?")}</span></h2>
      <div class="sub">${esc(p.affiliation || "")} · evaluated ${esc(p.evaluated || "?")} · ${esc(p.tier || "pool")} (via ${esc(p.channel || "?")})</div>
      <div class="section"><div class="label">Agent's assessment</div><p>${esc(p.assessment || "")}</p></div>
      <div class="section evidence"><div class="label">Links</div>
        ${(p.links || []).map(u => `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`).join("") || `<p style="color:var(--dim);font-size:14px">none</p>`}
      </div>
      <p style="color:var(--dim);font-size:13px;margin-top:14px">Pool records are lightweight — not fully verified.</p>
      <button class="save-btn" id="promote">${p.promote_requested ? "✓ Promotion requested" : "Request promotion to pipeline"}</button>
      <p class="hint">Promoting flags this person for your agent: on its next run it verifies them and adds them to your review queue (identity verification is the agent's job, so it can't be done from here).</p>
    </div>`);
  $("#back").onclick = () => { state.detail = null; render(); };
  if (p.promote_requested) $("#promote").disabled = true;
  $("#promote").onclick = async () => {
    $("#promote").disabled = true;
    try {
      if (state.rows.some(c => c.name.toLowerCase() === p.name.toLowerCase())) { toast("Already in your pipeline"); return; }
      unwrap(await supa.from("pool").update({ promote_requested: true }).eq("id", p.id));
      p.promote_requested = true;
      toast(`${p.name.split(" ")[0]} flagged for promotion`);
      render();
    } catch (e) {
      toast("Save failed — try again");
      $("#promote").disabled = false;
    }
  };
}

function renderDetail() {
  if (String(state.detail).startsWith("pool:")) {
    const p = (state.pool || [])[Number(state.detail.slice(5))];
    if (!p) { state.detail = null; return render(); }
    return renderPoolDetail(p);
  }
  const c = state.rows.find(x => x.id === state.detail);
  if (!c) { state.detail = null; return render(); }
  shell(`
    <button class="back" id="back">← Talent</button>
    ${candidateCard(c, `
      <div class="section"><div class="label">Status</div>
        <select id="status">${STATUSES.map(s => `<option ${s === c.status ? "selected" : ""}>${s}</option>`).join("")}</select>
      </div>
      <div class="section"><div class="label">Notes</div>
        <ul class="notes">${(c.notes || []).map(n =>
          `<li>${esc(n.text)}<span>${esc((n.author || "").split("@")[0])} · ${esc(String(n.created_at || "").slice(0, 10))}</span></li>`).join("")}</ul>
        <textarea id="newnote" placeholder="add a note…"></textarea>
        <button class="save-btn" id="save">Save changes</button>
      </div>`)}`);
  $("#back").onclick = () => { state.detail = null; render(); };
  $("#save").onclick = async () => {
    $("#save").disabled = true;
    const status = $("#status").value, note = $("#newnote").value.trim();
    if (status === c.status && !note) { state.detail = null; return render(); }
    try {
      await pushFeedback(c, status, note);
      toast("Saved");
      render();
    } catch (e) { toast("Save failed — try again"); $("#save").disabled = false; }
  };
}

/* ---------- boot ---------- */
function render() {
  if (state.showRoles) return renderRoles();
  state.tab === "review" ? renderReview() : renderTalent();
}
let authWired = false;

async function boot() {
  if (!anonKey()) return renderKeySetup();
  if (!supa) {
    supa = createClient(SUPA_URL, anonKey(), { auth: { detectSessionInUrl: true, flowType: "implicit" } });
    if (!authWired) {
      authWired = true;
      supa.auth.onAuthStateChange((event) => {
        if (event === "SIGNED_IN" || event === "SIGNED_OUT") boot();
      });
    }
  }
  app.innerHTML = `<div class="spin">Loading…</div>`;
  const { data: { session }, error } = await supa.auth.getSession();
  if (error || !session) return renderLogin();
  state.user = session.user;
  try {
    // resolve the logged-in email to a member row (org + permission). RLS already
    // scopes this to the caller's org; a non-member sees zero rows → not authorized.
    const members = unwrap(await supa.from("members")
      .select("id,org_id,email,name,permission,active")
      .ilike("email", state.user.email).eq("active", true));
    if (!members.length) return renderNotAuthorized();
    state.member = members[0];
    [state.rows, state.roles] = await Promise.all([loadReviews(), loadRoles()]);
    render();
  } catch (e) {
    if (String(e.message || "").includes("Invalid API key")) renderKeySetup("That key was rejected — paste the publishable/anon key.");
    else renderLogin(`Couldn't load: ${e.message || e}`, true);
  }
}
boot();
</script>
</body>
</html>
